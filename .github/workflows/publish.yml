name: Publish Figma Code Connect

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx figma connect publish --token ${{ secrets.FIGMA_ACCESS_TOKEN }} --verbose
